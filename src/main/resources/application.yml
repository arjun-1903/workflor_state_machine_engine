spring:
  application:
    name: workflow-engine
  datasource:
    url: jdbc:sqlite:workflow.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# To prevent Jackson serialization errors on Proxy objects
  jackson:
    serialization:
      fail-on-empty-beans: false
